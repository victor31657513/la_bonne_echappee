<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<title>La bonne échappée</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<style>
body { margin:0; overflow:hidden; }
canvas { width:100vw; height:100vh; display:block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

const params = new URLSearchParams(location.search);
const version = params.has('dev') ? `?v=${Date.now()}` : '';
const { curve3D } = await import(`./js/gpxLoader.js${version}`);
const { CyclistSim } = await import(`./js/physics.js${version}`);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 100, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0x666666));

const track = await curve3D('assets/parcours.gpx');
const lineGeo = new THREE.BufferGeometry().setFromPoints(track.getPoints(500));
const lineMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
const line = new THREE.Line(lineGeo, lineMat);
scene.add(line);

const boxGeo = new THREE.BoxGeometry(1, 2, 4);
const boxMat = new THREE.MeshPhongMaterial({ color: 0x0000ff });
const cyclist = new THREE.Mesh(boxGeo, boxMat);
scene.add(cyclist);

const sim = new CyclistSim(track);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let last = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - last) / 1000;
  last = now;
  sim.update(dt, cyclist);
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
