<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<title>La bonne échappée</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<style>
body { margin:0; overflow:hidden; }
canvas { width:100vw; height:100vh; display:block; touch-action:none; }
#speed {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #fff;
  font: 20px sans-serif;
  text-shadow: 0 0 5px #000;
}
#hud {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #fff;
  font: 14px sans-serif;
  text-shadow: 0 0 5px #000;
}
.bar {
  width: 200px;
  height: 10px;
  background: #444;
  margin: 2px 0;
}
.bar > div {
  height: 100%;
  background: #0f0;
  width: 100%;
}
#attackFill { background: #f00; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="speed">0 km/h | 0 m</div>
<div id="hud">
  <div>Énergie</div>
  <div class="bar"><div id="energyFill"></div></div>
  <div>Attaque</div>
  <div class="bar"><div id="attackFill"></div></div>
  <label>Intensité <input type="range" id="intensity" min="0" max="100" value="0"></label>
  <button id="attackBtn">Attaquer</button>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
