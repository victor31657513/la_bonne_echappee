<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<title>La bonne échappée</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<style>
body { margin:0; overflow:hidden; }
canvas { width:100vw; height:100vh; display:block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

const params = new URLSearchParams(location.search);
const version = params.has('dev') ? `?v=${Date.now()}` : '';
const { curve3D } = await import(`./js/gpxLoader.js${version}`);
const { CyclistSim } = await import(`./js/physics.js${version}`);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 100, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0x666666));

const track = await curve3D('assets/parcours.gpx');
const roadWidth = 12;
const segments = 500;
const frames = track.computeFrenetFrames(segments);
const positions = [];
const indices = [];
for (let i = 0; i <= segments; i++) {
  const u = i / segments;
  const p = track.getPointAt(u);
  const side = frames.binormals[i]
    .clone()
    .multiplyScalar(roadWidth / 2);
  positions.push(p.x + side.x, p.y + side.y, p.z + side.z);
  positions.push(p.x - side.x, p.y - side.y, p.z - side.z);
  if (i < segments) {
    const base = i * 2;
    indices.push(base, base + 1, base + 2);
    indices.push(base + 1, base + 3, base + 2);
  }
}
const roadGeo = new THREE.BufferGeometry();
roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
roadGeo.setIndex(indices);
roadGeo.computeVertexNormals();
const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333, side: THREE.DoubleSide });
const road = new THREE.Mesh(roadGeo, roadMat);
scene.add(road);

const boxGeo = new THREE.BoxGeometry(1, 2, 4);
boxGeo.translate(0, 1, 0);
const boxMat = new THREE.MeshPhongMaterial({ color: 0x0000ff });
const cyclist = new THREE.Mesh(boxGeo, boxMat);
scene.add(cyclist);

const sim = new CyclistSim(track);

const cameraOffset = new THREE.Vector3(0, 3, -10);
const smoothedOffset = cameraOffset.clone();
let yaw = 0;
let pitch = 0;
const keys = {
  ArrowLeft: false,
  ArrowRight: false,
  ArrowUp: false,
  ArrowDown: false,
};

window.addEventListener('keydown', (e) => {
  if (e.code in keys) {
    keys[e.code] = true;
  }
});
window.addEventListener('keyup', (e) => {
  if (e.code in keys) {
    keys[e.code] = false;
  }
});

function updateCamera(dt) {
  if (keys.ArrowLeft) yaw += 0.02;
  if (keys.ArrowRight) yaw -= 0.02;
  if (keys.ArrowUp) pitch = Math.min(pitch + 0.02, Math.PI / 3);
  if (keys.ArrowDown) pitch = Math.max(pitch - 0.02, -Math.PI / 3);

  const targetOffset = cameraOffset
    .clone()
    .applyAxisAngle(new THREE.Vector3(1, 0, 0), pitch)
    .applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw)
    .applyQuaternion(cyclist.quaternion);
  smoothedOffset.lerp(targetOffset, 0.1);
  camera.position.copy(cyclist.position).add(smoothedOffset);
  if (camera.position.y < cyclist.position.y) {
    camera.position.y = cyclist.position.y;
  }
  camera.lookAt(cyclist.position);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let last = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - last) / 1000;
  last = now;
  sim.update(dt, cyclist);
  updateCamera(dt);
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
